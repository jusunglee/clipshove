name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Create app bundle
        run: |
          APP="Clipshove.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp .build/release/Clipshove "$APP/Contents/MacOS/"

          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Clipshove</string>
            <key>CFBundleIdentifier</key>
            <string>com.clipshove.app</string>
            <key>CFBundleName</key>
            <string>Clipshove</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>LSUIElement</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R Clipshove.app dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "Clipshove" -srcfolder dmg_contents -ov -format UDZO Clipshove.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clipshove.dmg
          path: Clipshove.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Clipshove.dmg
          generate_release_notes: true
